<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a14" />
      <stop offset="100%" stop-color="#04060c" />
    </linearGradient>

    <!-- Neon Cyan-Blue Gradient -->
    <linearGradient id="cyan-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Neon Pink-Orange Gradient -->
    <linearGradient id="pink-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(3deg); }
    }
    @keyframes float-fast {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-15px) translateX(10px); }
    }
    @keyframes line-draw {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes gradient-shift {
      0% { stop-color: #00f2fe; }
      50% { stop-color: #9b51e0; }
      100% { stop-color: #00f2fe; }
    }

    .bg-grid {
      fill: none;
      stroke: #1e293b;
      stroke-width: 1;
      opacity: 0.15;
    }
    .node-cyan {
      fill: url(#cyan-blue);
      filter: url(#glow-cyan);
      animation: pulse 4s infinite ease-in-out;
    }
    .node-pink {
      fill: url(#pink-orange);
      filter: url(#glow-pink);
      animation: pulse 6s infinite ease-in-out;
    }
    .connection-line {
      stroke: #334155;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: line-draw 8s linear infinite;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', system-ui, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #94a3b8;
      letter-spacing: 4px;
    }
    .floating-orb-1 {
      animation: float-slow 10s infinite ease-in-out;
    }
    .floating-orb-2 {
      animation: float-fast 8s infinite ease-in-out;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="250" fill="url(#bg-grad)" />

  <!-- Grid Pattern -->
  <g class="bg-grid">
    <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225" />
    <path d="M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250 M 400,0 L 400,250 M 450,0 L 450,250 M 500,0 L 500,250 M 550,0 L 550,250 M 600,0 L 600,250 M 650,0 L 650,250 M 700,0 L 700,250 M 750,0 L 750,250" />
  </g>

  <!-- Animated Neural Net Connections -->
  <g opacity="0.4">
    <line x1="100" y1="50" x2="250" y2="100" stroke-width="1.5" class="connection-line" />
    <line x1="250" y1="100" x2="150" y2="200" stroke-width="1" class="connection-line" />
    <line x1="700" y1="60" x2="600" y2="180" stroke-width="1.5" class="connection-line" />
    <line x1="600" y1="180" x2="720" y2="210" stroke-width="1" class="connection-line" />
  </g>

  <!-- Animated Nodes (Orbs) -->
  <g class="floating-orb-1">
    <circle cx="100" cy="50" r="8" class="node-cyan" />
    <circle cx="700" cy="60" r="10" class="node-pink" />
  </g>
  <g class="floating-orb-2">
    <circle cx="250" cy="100" r="12" class="node-cyan" />
    <circle cx="600" cy="180" r="7" class="node-pink" />
    <circle cx="150" cy="200" r="9" class="node-cyan" />
  </g>

  <!-- Center Text Group -->
  <g transform="translate(400, 115)" text-anchor="middle">
    <!-- Main Title with Glowing Shadow -->
    <text y="0" class="title-text" filter="drop-shadow(0px 10px 15px rgba(79, 172, 254, 0.4))">AWESOME SENTENCE EMBEDDINGS</text>
    <!-- Subtitle -->
    <text y="40" class="subtitle-text">EVOLUTION • VARIANTS • LOSSES • APPLICATIONS</text>
  </g>

  <!-- Vector Representation Graphic -->
  <g transform="translate(400, 195)" opacity="0.8">
    <!-- Embedding Vector Bracket Representation -->
    <text text-anchor="middle" fill="#00f2fe" font-family="monospace" font-size="12" letter-spacing="3">[ v₀, v₁, v₂, v₃, ..., vₙ ]</text>
  </g>
</svg>